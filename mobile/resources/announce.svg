<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Фоновый градиент: brand-ink → primary → brand mint -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0A2B10"/>
      <stop offset="55%" stop-color="#1F5524"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>

    <!-- Радиальное мятное свечение в правом нижнем углу -->
    <radialGradient id="glow" cx="85%" cy="100%" r="70%">
      <stop offset="0%"  stop-color="#6EE87A" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6EE87A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6EE87A" stop-opacity="0"/>
    </radialGradient>

    <!-- Градиент для CTA кнопки -->
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#6EE87A"/>
      <stop offset="100%" stop-color="#9CFFA8"/>
    </linearGradient>

    <!-- Градиент экрана телефона -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#0F1A12"/>
      <stop offset="100%" stop-color="#0A2B10"/>
    </linearGradient>

    <!-- Тень -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- BrandWaves: декоративные волны слева (фирменный мотив) -->
  <g fill="none" stroke="#6EE87A" stroke-width="2.5" stroke-linecap="round" opacity="0.22">
    <path d="M -40 540 Q 80 480 200 540 T 440 540 T 680 540"/>
    <path d="M -40 580 Q 80 520 200 580 T 440 580 T 680 580"/>
    <path d="M -40 620 Q 80 560 200 620 T 440 620 T 680 620"/>
    <path d="M -40 660 Q 80 600 200 660 T 440 660 T 680 660"/>
  </g>
  <g fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.08">
    <path d="M -40 60 Q 120 0 280 60 T 600 60 T 920 60 T 1240 60"/>
    <path d="M -40 100 Q 120 40 280 100 T 600 100 T 920 100 T 1240 100"/>
  </g>

  <!-- Точки-узлы (имитация BrandWaves shape="circle") -->
  <g fill="#6EE87A" opacity="0.5">
    <circle cx="80"  cy="540" r="3"/>
    <circle cx="200" cy="540" r="3"/>
    <circle cx="320" cy="540" r="3"/>
    <circle cx="440" cy="540" r="3"/>
    <circle cx="80"  cy="580" r="3"/>
    <circle cx="200" cy="580" r="3"/>
    <circle cx="320" cy="580" r="3"/>
  </g>

  <!-- ===== ЛЕВАЯ ЧАСТЬ: текст ===== -->

  <!-- Шильдик "Уже доступно" -->
  <g transform="translate(70, 90)" filter="url(#softShadow)">
    <rect x="0" y="0" width="220" height="42" rx="21" fill="#6EE87A" opacity="0.18"/>
    <rect x="0" y="0" width="220" height="42" rx="21" fill="none" stroke="#6EE87A" stroke-width="1.5" opacity="0.7"/>
    <circle cx="22" cy="21" r="5" fill="#6EE87A"/>
    <circle cx="22" cy="21" r="9" fill="none" stroke="#6EE87A" stroke-width="1.5" opacity="0.5"/>
    <text x="42" y="28" font-family="Inter, 'SF Pro Display', system-ui, -apple-system, Arial, sans-serif"
          font-size="15" font-weight="600" fill="#6EE87A" letter-spacing="1.5">УЖЕ ДОСТУПНО</text>
  </g>

  <!-- DS логотип -->
  <g transform="translate(70, 160)">
    <text font-family="Inter, 'SF Pro Display', system-ui, -apple-system, Arial, sans-serif"
          font-size="52" font-weight="900" fill="#FFFFFF" letter-spacing="-2">DS</text>
    <text x="92" y="-2" font-family="Inter, system-ui, Arial, sans-serif"
          font-size="14" font-weight="500" fill="#6EE87A" letter-spacing="3">CONSULTING</text>
    <text x="92" y="20" font-family="Inter, system-ui, Arial, sans-serif"
          font-size="14" font-weight="500" fill="#FFFFFF" opacity="0.6" letter-spacing="3">PARTNER PLATFORM</text>
  </g>

  <!-- Главный заголовок -->
  <g transform="translate(70, 250)" font-family="Inter, 'SF Pro Display', system-ui, -apple-system, Arial, sans-serif">
    <text y="0"    font-size="68" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Платформа</text>
    <text y="76"   font-size="68" font-weight="800" fill="#FFFFFF" letter-spacing="-2">партнёра —</text>
    <text y="160"  font-size="68" font-weight="800" fill="#6EE87A" letter-spacing="-2">теперь в кармане</text>
  </g>

  <!-- Подзаголовок -->
  <text x="70" y="475" font-family="Inter, system-ui, Arial, sans-serif"
        font-size="20" font-weight="400" fill="#FFFFFF" opacity="0.78">
    Чат, договоры, начисления и обучение —
  </text>
  <text x="70" y="503" font-family="Inter, system-ui, Arial, sans-serif"
        font-size="20" font-weight="400" fill="#FFFFFF" opacity="0.78">
    всё в мобильном приложении DS.
  </text>

  <!-- CTA-кнопка -->
  <g transform="translate(70, 540)" filter="url(#softShadow)">
    <rect x="0" y="0" width="240" height="56" rx="28" fill="url(#ctaGrad)"/>
    <text x="120" y="35" text-anchor="middle"
          font-family="Inter, system-ui, Arial, sans-serif"
          font-size="17" font-weight="700" fill="#0A2B10" letter-spacing="0.5">СКАЧАТЬ ПРИЛОЖЕНИЕ</text>
  </g>

  <!-- Бейджи stores -->
  <g transform="translate(330, 545)" opacity="0.85">
    <g>
      <rect x="0" y="0" width="46" height="46" rx="10" fill="#FFFFFF" opacity="0.08"/>
      <rect x="0" y="0" width="46" height="46" rx="10" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.25"/>
      <!-- Android робот силуэт (упрощённо) -->
      <g transform="translate(11, 12)" fill="#6EE87A">
        <circle cx="6" cy="6" r="1.5"/>
        <circle cx="18" cy="6" r="1.5"/>
        <path d="M 4 8 L 4 18 L 20 18 L 20 8 Q 12 2 4 8 Z"/>
        <rect x="2"  y="11" width="2" height="9" rx="1"/>
        <rect x="20" y="11" width="2" height="9" rx="1"/>
        <rect x="7"  y="18" width="2" height="6" rx="1"/>
        <rect x="15" y="18" width="2" height="6" rx="1"/>
      </g>
    </g>
    <g transform="translate(58, 0)">
      <rect x="0" y="0" width="46" height="46" rx="10" fill="#FFFFFF" opacity="0.08"/>
      <rect x="0" y="0" width="46" height="46" rx="10" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.25"/>
      <!-- Apple silhouette -->
      <path transform="translate(11, 10)" fill="#FFFFFF"
            d="M 18 17 C 17.5 19 17 21 15 21 C 13.5 21 13 20 11.5 20 C 10 20 9 21 7.5 21 C 5.5 21 4 18 3.5 16 C 2.5 13 3.5 9 6 9 C 7 9 8 10 9.5 10 C 11 10 11.5 9 13 9 C 14 9 15.5 9.5 16.5 11 C 14 12.5 14.5 16 18 17 Z M 12 7 C 12.5 6 13.5 5 14.5 5 C 14.5 6 14 7.5 13 8 C 12 8.5 11 8 11 8 C 11 7.5 11.5 7 12 7 Z"/>
    </g>
  </g>

  <!-- ===== ПРАВАЯ ЧАСТЬ: телефон ===== -->

  <!-- Декоративное мятное кольцо за телефоном -->
  <circle cx="960" cy="338" r="220" fill="none" stroke="#6EE87A" stroke-width="2" opacity="0.18"/>
  <circle cx="960" cy="338" r="270" fill="none" stroke="#6EE87A" stroke-width="1" opacity="0.10"/>

  <!-- Корпус телефона -->
  <g transform="translate(820, 90)" filter="url(#dropShadow)">
    <!-- Внешняя рамка -->
    <rect x="0" y="0" width="280" height="540" rx="42" ry="42"
          fill="#0A1A0E" stroke="#1F3A24" stroke-width="2"/>
    <!-- Внутренняя рамка -->
    <rect x="8" y="8" width="264" height="524" rx="36" ry="36" fill="#000000"/>
    <!-- Экран -->
    <rect x="14" y="14" width="252" height="512" rx="32" ry="32" fill="url(#screenGrad)"/>

    <!-- Dynamic Island -->
    <rect x="110" y="24" width="60" height="20" rx="10" fill="#000"/>

    <!-- Статус-бар -->
    <text x="35" y="38" font-family="Inter, system-ui, Arial, sans-serif"
          font-size="11" font-weight="600" fill="#FFFFFF">9:41</text>
    <g transform="translate(220, 30)" fill="#FFFFFF">
      <rect x="0"  y="0" width="3" height="8" rx="1"/>
      <rect x="5"  y="-2" width="3" height="10" rx="1"/>
      <rect x="10" y="-4" width="3" height="12" rx="1"/>
      <rect x="18" y="-1" width="14" height="9" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1"/>
      <rect x="20" y="1" width="9" height="5" rx="1"/>
    </g>

    <!-- Верхний бренд-блок -->
    <g transform="translate(0, 60)">
      <text x="140" y="20" text-anchor="middle"
            font-family="Inter, system-ui, Arial, sans-serif"
            font-size="11" font-weight="500" fill="#6EE87A" letter-spacing="2">DS PARTNER</text>
      <text x="140" y="48" text-anchor="middle"
            font-family="Inter, system-ui, Arial, sans-serif"
            font-size="20" font-weight="700" fill="#FFFFFF">Добрый день!</text>
      <text x="140" y="68" text-anchor="middle"
            font-family="Inter, system-ui, Arial, sans-serif"
            font-size="11" font-weight="400" fill="#FFFFFF" opacity="0.6">Иван Петров · Серебряный</text>
    </g>

    <!-- Карточка баланса (главная) -->
    <g transform="translate(28, 158)">
      <rect x="0" y="0" width="224" height="100" rx="16"
            fill="#6EE87A" opacity="0.95"/>
      <text x="16" y="26" font-family="Inter, system-ui, Arial, sans-serif"
            font-size="10" font-weight="500" fill="#0A2B10" opacity="0.7" letter-spacing="1">БАЛАНС БОНУСОВ</text>
      <text x="16" y="62" font-family="Inter, system-ui, Arial, sans-serif"
            font-size="28" font-weight="800" fill="#0A2B10">12 450</text>
      <text x="130" y="62" font-family="Inter, system-ui, Arial, sans-serif"
            font-size="14" font-weight="500" fill="#0A2B10" opacity="0.6">баллов</text>
      <text x="16" y="84" font-family="Inter, system-ui, Arial, sans-serif"
            font-size="10" font-weight="500" fill="#0A2B10" opacity="0.7">+1 280 за месяц ↑</text>
      <!-- мини-волны на карточке -->
      <g fill="none" stroke="#0A2B10" stroke-width="1.2" opacity="0.12">
        <path d="M 130 14 Q 160 6 190 14 T 220 14"/>
        <path d="M 130 22 Q 160 14 190 22 T 220 22"/>
      </g>
    </g>

    <!-- Сетка быстрых действий -->
    <g transform="translate(28, 280)" font-family="Inter, system-ui, Arial, sans-serif">
      <!-- ряд 1 -->
      <g>
        <rect x="0" y="0" width="68" height="68" rx="14" fill="#FFFFFF" opacity="0.06"/>
        <rect x="0" y="0" width="68" height="68" rx="14" fill="none" stroke="#6EE87A" stroke-width="0.5" opacity="0.3"/>
        <text x="34" y="32" text-anchor="middle" font-size="20" fill="#6EE87A">💬</text>
        <text x="34" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#FFFFFF" opacity="0.85">Чат</text>
      </g>
      <g transform="translate(78, 0)">
        <rect x="0" y="0" width="68" height="68" rx="14" fill="#FFFFFF" opacity="0.06"/>
        <rect x="0" y="0" width="68" height="68" rx="14" fill="none" stroke="#6EE87A" stroke-width="0.5" opacity="0.3"/>
        <text x="34" y="32" text-anchor="middle" font-size="20" fill="#6EE87A">📄</text>
        <text x="34" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#FFFFFF" opacity="0.85">Договоры</text>
      </g>
      <g transform="translate(156, 0)">
        <rect x="0" y="0" width="68" height="68" rx="14" fill="#FFFFFF" opacity="0.06"/>
        <rect x="0" y="0" width="68" height="68" rx="14" fill="none" stroke="#6EE87A" stroke-width="0.5" opacity="0.3"/>
        <text x="34" y="32" text-anchor="middle" font-size="20" fill="#6EE87A">🎓</text>
        <text x="34" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#FFFFFF" opacity="0.85">Обучение</text>
      </g>
      <!-- ряд 2 -->
      <g transform="translate(0, 78)">
        <rect x="0" y="0" width="68" height="68" rx="14" fill="#FFFFFF" opacity="0.06"/>
        <rect x="0" y="0" width="68" height="68" rx="14" fill="none" stroke="#6EE87A" stroke-width="0.5" opacity="0.3"/>
        <text x="34" y="32" text-anchor="middle" font-size="20" fill="#6EE87A">💳</text>
        <text x="34" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#FFFFFF" opacity="0.85">Операции</text>
      </g>
      <g transform="translate(78, 78)">
        <rect x="0" y="0" width="68" height="68" rx="14" fill="#FFFFFF" opacity="0.06"/>
        <rect x="0" y="0" width="68" height="68" rx="14" fill="none" stroke="#6EE87A" stroke-width="0.5" opacity="0.3"/>
        <text x="34" y="32" text-anchor="middle" font-size="20" fill="#6EE87A">🔔</text>
        <text x="34" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#FFFFFF" opacity="0.85">Уведомл.</text>
      </g>
      <g transform="translate(156, 78)">
        <rect x="0" y="0" width="68" height="68" rx="14" fill="#FFFFFF" opacity="0.06"/>
        <rect x="0" y="0" width="68" height="68" rx="14" fill="none" stroke="#6EE87A" stroke-width="0.5" opacity="0.3"/>
        <text x="34" y="32" text-anchor="middle" font-size="20" fill="#6EE87A">👤</text>
        <text x="34" y="56" text-anchor="middle" font-size="9" font-weight="500" fill="#FFFFFF" opacity="0.85">Профиль</text>
      </g>
    </g>

    <!-- Нижний таб-бар -->
    <g transform="translate(14, 478)">
      <rect x="0" y="0" width="252" height="48" rx="0" fill="#0A1A0E" opacity="0.9"/>
      <line x1="0" y1="0" x2="252" y2="0" stroke="#6EE87A" stroke-width="0.5" opacity="0.2"/>
      <g fill="#FFFFFF" opacity="0.4">
        <circle cx="42" cy="24" r="3"/>
        <circle cx="105" cy="24" r="3"/>
      </g>
      <circle cx="168" cy="24" r="4" fill="#6EE87A"/>
      <g fill="#FFFFFF" opacity="0.4">
        <circle cx="231" cy="24" r="3"/>
      </g>
    </g>

    <!-- Home indicator -->
    <rect x="105" y="510" width="70" height="4" rx="2" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <!-- Маленький badge "new" -->
  <g transform="translate(1075, 110)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="34" fill="#6EE87A"/>
    <text y="-3" text-anchor="middle" font-family="Inter, system-ui, Arial, sans-serif"
          font-size="10" font-weight="700" fill="#0A2B10" letter-spacing="1">NEW</text>
    <text y="12" text-anchor="middle" font-family="Inter, system-ui, Arial, sans-serif"
          font-size="9" font-weight="600" fill="#0A2B10">2026</text>
  </g>

  <!-- Низ: тонкая подпись -->
  <text x="600" y="650" text-anchor="middle"
        font-family="Inter, system-ui, Arial, sans-serif"
        font-size="11" font-weight="400" fill="#FFFFFF" opacity="0.35" letter-spacing="3">
    DS CONSULTING · PARTNER PLATFORM · 2026
  </text>
</svg>
