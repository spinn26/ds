name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/newds

            git fetch origin main
            git reset --hard origin/main

            COMPOSER_ALLOW_SUPERUSER=1 composer update --no-dev --no-interaction --prefer-dist --optimize-autoloader

            # Build React SPA
            cd /var/www/newds/frontend
            npm install --production=false
            npm run build
            rm -rf /var/www/newds/public/spa
            cp -r /var/www/newds/frontend/build /var/www/newds/public/spa

            cd /var/www/newds
            php artisan migrate --force
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
