name: Deploy to Server

# Автодеплой в /var/www/newds на dev.dsconsult.ru (он же prod).
# Секреты GitHub:
#   SERVER_HOST     — dev.dsconsult.ru
#   SERVER_USER     — root
#   SERVER_PASSWORD — пароль root
#
# Workflow триггерится на каждый push в main и:
#   1) подтягивает код,
#   2) пересобирает PHP- и JS-зависимости,
#   3) накатывает миграции,
#   4) перезапускает queue-воркеры (новый код job'ов) и socket-server (pm2),
#   5) кэширует config/route/view через `artisan optimize` (прод-режим),
#   6) фиксит owner/group для storage и bootstrap/cache (root-операции
#      ломают права, php-fpm как www-data потом не пишет в логи/кэш).

on:
  push:
    branches:
      - main
  workflow_dispatch:   # ручной запуск из GitHub UI

jobs:
  # Гейт перед деплоем: статический анализ. Стиль (Pint) и полный
  # `artisan test` сюда НЕ включены намеренно:
  #   - Pint: код ещё не приведён к стилю целиком → red на каждом пуше;
  #   - artisan test: 286 легаси-таблиц без миграций, feature-тесты по
  #     "WebUser"/"person" в чистой CI-базе всегда красные.
  # PHPStan (level 5 + baseline) детерминирован и ловит реальные баги
  # (тип-ошибки, cast-и, nullsafe) — новые ошибки блокируют деплой,
  # существующий долг заморожен в phpstan-baseline.neon.
  quality:
    runs-on: ubuntu-latest
    # Приложение бутстрапится и на composer package:discover, и внутри
    # larastan. Без БД оно должно грузиться вхолостую: sqlite-файл +
    # эти env дают Schema::hasTable() штатный false (см. SystemSetting::map).
    env:
      APP_ENV: testing
      APP_KEY: base64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # Пустой файл БД до composer install: package:discover грузит app,
      # SystemSetting::map() зовёт Schema::hasTable() — без файла sqlite
      # драйвер падает ещё до guard'а.
      - name: Prepare empty sqlite database
        run: touch database/database.sqlite

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHPStan (static analysis)
        run: php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress

  deploy:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /var/www/newds

            echo "::group::Pull"
            git fetch origin main
            git reset --hard origin/main
            git log -1 --oneline
            echo "::endgroup::"

            echo "::group::Composer"
            COMPOSER_ALLOW_SUPERUSER=1 composer install \
              --no-dev --no-interaction --prefer-dist --optimize-autoloader
            echo "::endgroup::"

            echo "::group::Frontend build"
            npm ci --no-audit --no-fund
            # Собираем в staging-каталог, потом атомарно подменяем. Иначе
            # `vite build` в начале очищает public/build → manifest.json
            # отсутствует всё время сборки (десятки секунд), и каждый живой
            # запрос падает в 500 "Vite manifest not found".
            rm -rf public/build_new public/build_old
            npm run build -- --outDir public/build_new --emptyOutDir
            if [ -d public/build ]; then mv public/build public/build_old; fi
            mv public/build_new public/build
            rm -rf public/build_old
            echo "::endgroup::"

            echo "::group::DB migrations"
            php artisan migrate --force
            echo "::endgroup::"

            echo "::group::Cache rebuild"
            # `optimize` сам перекэширует config/route/view/event: каждая
            # под-команда внутри делает clear+rebuild своего файла с минимальным
            # окном. Явные *:clear убраны — они удаляли routes-v7.php на всё
            # время config:cache (несколько секунд), и параллельные запросы
            # ловили "require(routes-v7.php): Failed to open stream".
            php artisan optimize
            echo "::endgroup::"

            echo "::group::Restart workers"
            # Queue: graceful — текущий job дорабатывает, потом подхватывает
            # новый код. Если supervisor стоит на autorestart=true — он
            # сразу запустит новый процесс.
            php artisan queue:restart || true
            # Socket-server под pm2 — reload без даунтайма.
            # Имя процесса — `ds-socket` (см. `pm2 list` на сервере).
            pm2 reload ds-socket 2>/dev/null \
              || pm2 start socket-server/index.js --name ds-socket
            pm2 save
            echo "::endgroup::"

            echo "::group::Fix permissions"
            # composer/npm/git под root → файлы становятся root:root, php-fpm
            # как www-data потом не пишет в storage/logs и bootstrap/cache.
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R ug+rwX storage bootstrap/cache
            echo "::endgroup::"

            echo "Deploy OK — $(git log -1 --oneline)"
