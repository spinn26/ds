name: Mobile · Android APK

on:
  workflow_dispatch:        # запускается вручную с кнопки в Actions
  push:
    tags:
      - 'mobile-v*'         # либо при пуше тега вида mobile-v0.1.0

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: npm install
        run: npm ci --legacy-peer-deps

      - name: Build SPA (vite)
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Gradle assembleDebug
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ds-partner-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Create GitHub Release (только для tag-пушей)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          name: "DS Partner ${{ github.ref_name }}"
          generate_release_notes: true
